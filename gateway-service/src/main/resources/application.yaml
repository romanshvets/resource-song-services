spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: resource-service
              uri:
                lb://RESOURCE-SERVICE
              predicates:
                - Path=/resources/**
            - id: song-service
              uri:
                lb://SONG-SERVICE
              predicates:
                - Path=/songs/**
  servlet:
    encoding:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

server:
  port: 8090